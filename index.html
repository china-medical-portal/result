<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BTEB Results Zone - Official</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fbff; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .result-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; margin-bottom: 10px; }
        .semester-head { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 5px; }
        .gpa-box { background: #fdfdfd; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
        .passed { color: #28a745; }
        .failed { color: #dc3545; }
        .referred { color: #fd7e14; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:#0056b3; text-align:center;">BTEB Results Zone</h2>
    <div class="card">
        <input type="number" id="roll" placeholder="Enter Roll Number (884601 - 884650)">
        <button onclick="viewResult()">View Result</button>
    </div>
    <div id="result-display"></div>
</div>

<script>
function viewResult() {
    let roll = parseInt(document.getElementById("roll").value);
    let disp = document.getElementById("result-display");
    
    if(roll >= 884601 && roll <= 884650) {
        let statuses = ["Passed", "Passed", "Failed", "Referred", "Yet to Pass"];
        let status = statuses[Math.floor(Math.random() * statuses.length)];
        let statusClass = status.toLowerCase().replace(' ', '');
        
        disp.innerHTML = `
            <div class="card">
                <h3># ${roll}</h3>
                <p><strong>Name:</strong> STUDENT_${roll}</p>
                <p><strong>Institute:</strong> Bangladesh-Sweden Polytechnic Institute, Rangamati</p>
                <p><strong>Status:</strong> <span class="${statusClass}">${status}</span></p>
            </div>
            <div class="result-item">
                <div class="semester-head"><span>4th Semester</span><span>28 April, 2026</span></div>
                <div class="gpa-box"><span>GPA: 3.67</span> <span>A-</span></div>
            </div>
            <div class="result-item">
                <div class="semester-head"><span>3rd Semester</span><span>26 October, 2025</span></div>
                <div class="gpa-box"><span>GPA: 3.26</span> <span>B+</span></div>
            </div>
            <div class="result-item">
                <div class="semester-head"><span>2nd Semester</span><span>11 March, 2025</span></div>
                <div class="gpa-box"><span>GPA: 3.37</span> <span>B+</span></div>
            </div>
            <div class="result-item">
                <div class="semester-head"><span>1st Semester</span><span>01 September, 2024</span></div>
                <div class="gpa-box"><span>GPA: 2.93</span> <span>B</span></div>
            </div>
        `;
    } else {
        disp.innerHTML = "<p style='text-align:center; color:red;'>Invalid Roll Number!</p>";
    }
}
</script>
</body>
</html>
